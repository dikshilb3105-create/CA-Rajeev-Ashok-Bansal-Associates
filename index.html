<style>

:root {
  --primary: #0b5ed7;
  --dark: #0a2540;
  --light: #f4f7fb;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  line-height: 1.6;
  background: white;
}

/* HEADER */

header {
  position: fixed;
  width: 100%;
  top: 0;
  z-index: 1000;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 50px;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.85);
  transition: 0.3s;
}

header.sticky {
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

.logo {
  font-size: 20px;
  font-weight: 600;
  color: var(--dark);
}

.sub-logo {
  font-size: 12px;
  color: gray;
}

nav a {
  margin-left: 25px;
  text-decoration: none;
  color: var(--dark);
  font-weight: 500;
  position: relative;
}

nav a::after {
  content: "";
  position: absolute;
  width: 0%;
  height: 2px;
  bottom: -5px;
  left: 0;
  background: var(--primary);
  transition: 0.3s;
}

nav a:hover::after {
  width: 100%;
}

/* HERO */

.hero {
  height: 100vh;
  background: linear-gradient(rgba(10,37,64,0.7), rgba(10,37,64,0.7)),
  url("https://images.unsplash.com/photo-1554224154-26032ffc0d07") center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
}

.hero h1 {
  font-size: 48px;
  font-weight: 700;
  margin-bottom: 15px;
}

.hero p {
  font-size: 18px;
  margin-bottom: 10px;
}

.hero button {
  margin-top: 20px;
  padding: 14px 28px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  background: var(--primary);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.hero button:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

section {
  padding: 90px 50px;
}

h2 {
  text-align: center;
  margin-bottom: 40px;
  font-size: 32px;
  color: var(--dark);
}

/* SERVICES */

.services {
  background: var(--light);
}

.service-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 25px;
}

.card {
  height: 260px;
  background-size: cover;
  background-position: center;
  border-radius: 14px;
  overflow: hidden;
  position: relative;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 30px rgba(0,0,0,0.2);
}

.card-inner {
  height: 100%;
  background: rgba(0,0,0,0.55);
  color: white;
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.card h3 {
  font-size: 20px;
}

.card button {
  padding: 10px;
  border-radius: 6px;
  border: none;
  background: white;
  color: var(--dark);
  font-weight: 500;
  cursor: pointer;
}

.card-popup {
  display: none;
  position: absolute;
  top: 10%;
  left: 8%;
  right: 8%;
  background: white;
  color: black;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.card-popup.open {
  display: block;
}

.close-popup {
  float: right;
  font-size: 18px;
  cursor: pointer;
}
